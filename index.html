<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>For My Love ❤️</title>

<style>
body{
font-family:Arial,sans-serif;
margin:0;
background:linear-gradient(to right,#ff9a9e,#fad0c4);
color:white;
text-align:center;
}

.hero{
padding:100px 20px;
}

h1{
font-size:60px;
}

section{
padding:60px 20px;
}

.card{
background:rgba(255,255,255,0.2);
margin:20px auto;
padding:20px;
max-width:700px;
border-radius:20px;
}

button{
padding:15px 30px;
font-size:18px;
border:none;
border-radius:30px;
cursor:pointer;
}

#surprise{
display:none;
margin-top:20px;
font-size:24px;
}
</style>
</head>

<body>

<div class="hero">
<h1>For My Beautiful Girlfriend ❤️</h1>
<p>This little website is made just for you.</p>
</div>

<section>
<div class="card">
<h2>My Love Letter</h2>
<p>
Write your personal message here...
</p>
</div>
</section>

<section>
<div class="card">
<h2>Reasons I Love You</h2>
<p>Your smile 😊</p>
<p>Your kindness ❤️</p>
<p>Your laugh 🌸</p>
</div>
</section>

<section>
<div class="card">
<h2>A Surprise</h2>

<button onclick="showMessage()">
Click Me
</button>

<div id="surprise">
You are the best thing that ever happened to me ❤️
</div>

</div>
</section>

<script>
function showMessage(){
document.getElementById("surprise").style.display="block";
}
</script>

</body>
</html>
